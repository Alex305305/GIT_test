<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Книги</title>
  </head>
  <body>
    <h1>Все книги</h1>
    <a href="{{ url_for('add_book') }}">Добавить книгу</a>
    <ul>
      {% for book in books %}
        <li>
          «{{ book.title }}» — {{ book.author }} ({{ book.year }})
        </li>
      {% endfor %}
    </ul>
  </body>
</html>
