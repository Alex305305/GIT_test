<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MY NOTE != Мои заметки</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Блакнот Note </h1>
    <a href="{{ url_for('add_note') }}" class="btn">+ Добавить Note</a>
    <ul>
        {% for note in notes %}
        <li>
            <strong>{{ note.title }}</strong>
            <p>{{ note.content[:50] }}{% if note.content|length > 50 %}...{% endif %}</p>
            <small>{{ note.created_at.strftime('%d.%m.%Y %H:%M') }}</small>
            <div class="actions">
                <a href="{{ url_for('edit_note', note_id=note.id) }}" class="btn">✏️ Редактировать</a>
                <a href="{{ url_for('delete_note', note_id=note.id) }}" class="btn danger">🗑️ Удалить</a>
            </div>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
